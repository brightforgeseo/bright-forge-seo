name: Bright Forge QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-qa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Run static Bright Forge QA
        run: npm run qa:static
