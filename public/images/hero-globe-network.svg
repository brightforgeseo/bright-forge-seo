<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760" preserveAspectRatio="xMidYMid meet">
    <defs>
      <radialGradient id="bf-globe-core" cx="68%" cy="44%" r="48%">
        <stop offset="0%" stop-color="#f0622a" stop-opacity="0.28" />
        <stop offset="42%" stop-color="#f0622a" stop-opacity="0.12" />
        <stop offset="100%" stop-color="#f0622a" stop-opacity="0" />
      </radialGradient>
      <linearGradient id="bf-globe-line" x1="450" y1="320" x2="990" y2="320" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#5b2d1f" stop-opacity="0.22" />
        <stop offset="48%" stop-color="#d46a35" stop-opacity="0.52" />
        <stop offset="100%" stop-color="#ff8a3d" stop-opacity="0.92" />
      </linearGradient>
      <linearGradient id="bf-globe-faint" x1="450" y1="320" x2="990" y2="320" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.05" />
        <stop offset="56%" stop-color="#f0622a" stop-opacity="0.26" />
        <stop offset="100%" stop-color="#ffd0ad" stop-opacity="0.42" />
      </linearGradient>
      <filter id="bf-globe-glow" x="-25%" y="-25%" width="150%" height="150%">
        <feGaussianBlur stdDeviation="5" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <filter id="bf-node-glow" x="-180%" y="-180%" width="460%" height="460%">
        <feGaussianBlur stdDeviation="8" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <clipPath id="bf-globe-clip">
        <circle cx="735" cy="340" r="242" />
      </clipPath>
    </defs>

    <rect width="1120" height="760" fill="transparent" />
    <g transform="translate(110 55) scale(0.84)">
    <circle cx="735" cy="340" r="315" fill="url(#bf-globe-core)" />
    <circle cx="808" cy="332" r="210" fill="#f0622a" opacity="0.055" />

    <g class="globe-grid" clip-path="url(#bf-globe-clip)" filter="url(#bf-globe-glow)">
      <circle cx="735" cy="340" r="240" fill="none" stroke="url(#bf-globe-line)" stroke-width="2.8" opacity="0.72" />

      <!-- latitude bands -->
      <ellipse cx="735" cy="340" rx="238" ry="44" fill="none" stroke="url(#bf-globe-line)" stroke-width="1.6" opacity="0.62" />
      <ellipse cx="735" cy="295" rx="224" ry="38" fill="none" stroke="url(#bf-globe-faint)" stroke-width="1.25" opacity="0.56" />
      <ellipse cx="735" cy="385" rx="224" ry="38" fill="none" stroke="url(#bf-globe-faint)" stroke-width="1.25" opacity="0.50" />
      <ellipse cx="735" cy="250" rx="184" ry="30" fill="none" stroke="url(#bf-globe-faint)" stroke-width="1.05" opacity="0.38" />
      <ellipse cx="735" cy="430" rx="184" ry="30" fill="none" stroke="url(#bf-globe-faint)" stroke-width="1.05" opacity="0.34" />
      <ellipse cx="735" cy="208" rx="116" ry="19" fill="none" stroke="url(#bf-globe-faint)" stroke-width="0.9" opacity="0.24" />
      <ellipse cx="735" cy="472" rx="116" ry="19" fill="none" stroke="url(#bf-globe-faint)" stroke-width="0.9" opacity="0.22" />

      <!-- meridians -->
      <ellipse cx="735" cy="340" rx="48" ry="240" fill="none" stroke="url(#bf-globe-line)" stroke-width="1.3" opacity="0.56" />
      <ellipse cx="735" cy="340" rx="86" ry="240" fill="none" stroke="url(#bf-globe-line)" stroke-width="1.15" opacity="0.48" />
      <ellipse cx="735" cy="340" rx="128" ry="240" fill="none" stroke="url(#bf-globe-faint)" stroke-width="1" opacity="0.42" />
      <ellipse cx="735" cy="340" rx="170" ry="240" fill="none" stroke="url(#bf-globe-faint)" stroke-width="1" opacity="0.34" />
      <ellipse cx="735" cy="340" rx="210" ry="240" fill="none" stroke="url(#bf-globe-faint)" stroke-width="0.9" opacity="0.26" />
      <ellipse cx="735" cy="340" rx="238" ry="80" transform="rotate(58 735 340)" fill="none" stroke="url(#bf-globe-line)" stroke-width="1.25" opacity="0.48" />
      <ellipse cx="735" cy="340" rx="238" ry="80" transform="rotate(-58 735 340)" fill="none" stroke="url(#bf-globe-line)" stroke-width="1.25" opacity="0.46" />
      <ellipse cx="735" cy="340" rx="238" ry="115" transform="rotate(24 735 340)" fill="none" stroke="url(#bf-globe-faint)" stroke-width="1" opacity="0.34" />
      <ellipse cx="735" cy="340" rx="238" ry="115" transform="rotate(-24 735 340)" fill="none" stroke="url(#bf-globe-faint)" stroke-width="1" opacity="0.32" />

      <!-- network arcs -->
      <path d="M604 298 C680 210 805 203 902 287" fill="none" stroke="#f97335" stroke-width="1.4" opacity="0.48" />
      <path d="M575 364 C662 303 777 297 925 382" fill="none" stroke="#f97335" stroke-width="1.35" opacity="0.42" />
      <path d="M648 482 C700 385 808 320 947 306" fill="none" stroke="#ff9b55" stroke-width="1.2" opacity="0.36" />
      <path d="M660 205 C735 300 824 384 875 505" fill="none" stroke="#d46a35" stroke-width="1" opacity="0.32" />
      <path d="M530 340 C640 420 775 470 920 438" fill="none" stroke="#f0622a" stroke-width="1.2" opacity="0.34" />
    </g>

    <circle cx="735" cy="340" r="242" fill="none" stroke="#ffb37d" stroke-width="1.1" opacity="0.28" />
    <path d="M922 180 A242 242 0 0 1 922 500" fill="none" stroke="#ff8a3d" stroke-width="4" opacity="0.32" filter="url(#bf-globe-glow)" />

    <g class="globe-nodes" filter="url(#bf-node-glow)">
      <circle cx="890" cy="287" r="5.8" fill="#ff7a35" />
      <circle cx="890" cy="287" r="16" fill="#f0622a" opacity="0.14" />
      <circle cx="786" cy="235" r="4.4" fill="#ff9b55" />
      <circle cx="786" cy="235" r="12" fill="#f0622a" opacity="0.12" />
      <circle cx="648" cy="482" r="4.5" fill="#f0622a" />
      <circle cx="648" cy="482" r="12" fill="#f0622a" opacity="0.10" />
      <circle cx="575" cy="364" r="3.6" fill="#d96a37" />
      <circle cx="805" cy="340" r="3.8" fill="#ffad72" />
      <circle cx="910" cy="438" r="4.1" fill="#f97335" />
      <circle cx="702" cy="294" r="3.2" fill="#e87942" />
      <circle cx="830" cy="430" r="3.4" fill="#f97335" />
      <circle cx="660" cy="205" r="3.1" fill="#d96a37" />
    </g>
    </g>
  </svg>