    <path d="M472 314 C610 215 764 204 915 292" fill="none" stroke="#ff8a3d" stroke-width="1.1" opacity="0.16"/>
    <path d="M552 60 C626 202 742 298 855 427" fill="none" stroke="#f0622a" stroke-width="1" opacity="0.13"/>
  </g>

  <circle cx="686" cy="218" r="218" fill="url(#sphereFill)" opacity="0.96"/>
  <circle cx="686" cy="218" r="217" fill="url(#sphereHighlight)" opacity="0.9"/>

  <g clip-path="url(#globeClip)">
    <g opacity="0.50">
      <ellipse cx="686" cy="218" rx="218" ry="39" fill="none" stroke="url(#backLine)" stroke-width="1.05"/>
      <ellipse cx="686" cy="178" rx="207" ry="36" fill="none" stroke="url(#backLine)" stroke-width="0.92"/>
      <ellipse cx="686" cy="258" rx="207" ry="36" fill="none" stroke="url(#backLine)" stroke-width="0.92"/>
      <ellipse cx="686" cy="137" rx="178" ry="28" fill="none" stroke="url(#backLine)" stroke-width="0.82"/>
      <ellipse cx="686" cy="299" rx="178" ry="28" fill="none" stroke="url(#backLine)" stroke-width="0.82"/>
      <ellipse cx="686" cy="97" rx="126" ry="18" fill="none" stroke="url(#backLine)" stroke-width="0.74"/>
      <ellipse cx="686" cy="339" rx="126" ry="18" fill="none" stroke="url(#backLine)" stroke-width="0.74"/>
    </g>

    <g mask="url(#frontFade)" filter="url(#rimGlow)">
      <ellipse cx="686" cy="218" rx="218" ry="39" fill="none" stroke="url(#frontLine)" stroke-width="1.45" opacity="0.86"/>
      <ellipse cx="686" cy="178" rx="207" ry="36" fill="none" stroke="url(#frontLine)" stroke-width="1.12" opacity="0.70"/>
      <ellipse cx="686" cy="258" rx="207" ry="36" fill="none" stroke="url(#frontLine)" stroke-width="1.12" opacity="0.70"/>
      <ellipse cx="686" cy="137" rx="178" ry="28" fill="none" stroke="url(#frontLine)" stroke-width="0.98" opacity="0.58"/>
      <ellipse cx="686" cy="299" rx="178" ry="28" fill="none" stroke="url(#frontLine)" stroke-width="0.98" opacity="0.58"/>
      <ellipse cx="686" cy="97" rx="126" ry="18" fill="none" stroke="url(#frontLine)" stroke-width="0.84" opacity="0.44"/>
      <ellipse cx="686" cy="339" rx="126" ry="18" fill="none" stroke="url(#frontLine)" stroke-width="0.84" opacity="0.44"/>

      <ellipse cx="686" cy="218" rx="42" ry="218" fill="none" stroke="url(#frontLine)" stroke-width="1.18" opacity="0.66"/>
      <ellipse cx="686" cy="218" rx="84" ry="218" fill="none" stroke="url(#frontLine)" stroke-width="1.04" opacity="0.56"/>
      <ellipse cx="686" cy="218" rx="128" ry="218" fill="none" stroke="url(#frontLine)" stroke-width="0.92" opacity="0.46"/>
      <ellipse cx="686" cy="218" rx="173" ry="218" fill="none" stroke="url(#frontLine)" stroke-width="0.84" opacity="0.36"/>
      <ellipse cx="686" cy="218" rx="216" ry="83" transform="rotate(57 686 218)" fill="none" stroke="url(#frontLine)" stroke-width="1.08" opacity="0.66"/>
      <ellipse cx="686" cy="218" rx="216" ry="83" transform="rotate(-57 686 218)" fill="none" stroke="url(#frontLine)" stroke-width="1.08" opacity="0.62"/>
      <ellipse cx="686" cy="218" rx="216" ry="112" transform="rotate(24 686 218)" fill="none" stroke="url(#frontLine)" stroke-width="0.88" opacity="0.48"/>
      <ellipse cx="686" cy="218" rx="216" ry="112" transform="rotate(-24 686 218)" fill="none" stroke="url(#frontLine)" stroke-width="0.88" opacity="0.48"/>
    </g>

    <g filter="url(#rimGlow)">
      <path d="M536 170 C618 72 759 66 850 163" fill="none" stroke="#ffa562" stroke-width="1.2" opacity="0.68"/>
      <path d="M512 232 C614 166 734 168 870 247" fill="none" stroke="#ff8b3d" stroke-width="1.16" opacity="0.60"/>
      <path d="M548 330 C628 246 738 212 876 191" fill="none" stroke="#ffad6b" stroke-width="1.02" opacity="0.50"/>
      <path d="M585 88 C647 198 742 294 802 392" fill="none" stroke="#e47a34" stroke-width="0.96" opacity="0.42"/>
      <path d="M486 216 C596 302 732 340 870 306" fill="none" stroke="#f58b42" stroke-width="0.94" opacity="0.42"/>
    </g>
  </g>

  <circle cx="686" cy="218" r="218" fill="none" stroke="#ffb36e" stroke-width="1.15" opacity="0.58" filter="url(#rimGlow)"/>
  <path d="M837 57 A218 218 0 0 1 844 379" fill="none" stroke="#ff8a3d" stroke-width="3.2" opacity="0.48" filter="url(#softGlow)"/>
  <path d="M555 392 A218 218 0 0 0 838 378" fill="none" stroke="#ff9d55" stroke-width="1.7" opacity="0.32" filter="url(#rimGlow)"/>

  <g filter="url(#nodeGlow)">
    <circle cx="812" cy="158" r="4.7" fill="#ff6b2e"/>
    <circle cx="736" cy="108" r="3.8" fill="#ffad6b"/>
    <circle cx="621" cy="156" r="3.5" fill="#ff7a35"/>
    <circle cx="552" cy="230" r="4.2" fill="#ff6b2e"/>
    <circle cx="756" cy="229" r="3.8" fill="#ffc17d"/>
    <circle cx="846" cy="246" r="5.0" fill="#ff6b2e"/>
    <circle cx="648" cy="318" r="3.9" fill="#ff8a3d"/>
    <circle cx="797" cy="352" r="3.4" fill="#f0622a"/>
    <circle cx="874" cy="190" r="3.5" fill="#ff9d55"/>
  </g>
  </g>
</svg>
