<svg xmlns="http://www.w3.org/2000/svg" viewBox="-80 -90 1120 780" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Three dimensional orange network globe">
  <defs>
    <radialGradient id="ambient" cx="59%" cy="46%" r="58%">
      <stop offset="0%" stop-color="#ff7a35" stop-opacity="0.36"/>
      <stop offset="34%" stop-color="#f0622a" stop-opacity="0.18"/>
      <stop offset="72%" stop-color="#f0622a" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#f0622a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sphereFill" cx="73%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#f78a3b" stop-opacity="0.22"/>
      <stop offset="26%" stop-color="#d95f28" stop-opacity="0.10"/>
      <stop offset="62%" stop-color="#0b1723" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#020914" stop-opacity="0.56"/>
    </radialGradient>
    <radialGradient id="sphereHighlight" cx="72%" cy="25%" r="56%">
      <stop offset="0%" stop-color="#ffbc75" stop-opacity="0.26"/>
      <stop offset="36%" stop-color="#ff7a35" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff7a35" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frontLine" x1="500" y1="115" x2="880" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f2a260" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#ff8b3d" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#ffc17d" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="backLine" x1="470" y1="100" x2="865" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8d4722" stop-opacity="0.10"/>
      <stop offset="0.55" stop-color="#b85a27" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#f0622a" stop-opacity="0.42"/>
    </linearGradient>
    <filter id="softGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rimGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow" x="-220%" y="-220%" width="540%" height="540%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="globeClip">
      <circle cx="686" cy="218" r="218"/>
    </clipPath>
    <mask id="frontFade">
      <rect x="420" y="-40" width="560" height="560" fill="white"/>
      <ellipse cx="585" cy="245" rx="145" ry="250" fill="black" opacity="0.34"/>
      <ellipse cx="540" cy="260" rx="95" ry="230" fill="black" opacity="0.30"/>
    </mask>
  </defs>

  <rect x="-80" y="-90" width="1120" height="780" fill="transparent"/>
  <g transform="translate(-56 36)">
  <ellipse cx="600" cy="258" rx="390" ry="290" fill="url(#ambient)" opacity="0.98"/>
  <ellipse cx="675" cy="232" rx="260" ry="235" fill="#f0622a" opacity="0.08" filter="url(#softGlow)"/>

  <g filter="url(#softGlow)" opacity="0.8">
